<script>
     $(document).ready(function () {
        $('.login-btn').on('click', function(){
            var userID = $('input#customerid').val();
            localStorage.customer_id = userID;
            if (userID.length > "0") {
                $('.form-horizontal .user-inputs input#customerid').css("border-color", "green");
                utag.view({ 'tealium_event':'user_login','page_type' :'user_login','page_name' :'Login','customer_id':userID});
                console.log (userID + " Is the user ID");
                window.location.href = "cashrewards_offer.html";
            }
            else {
                $('.form-horizontal .user-inputs input#customerid').css("border-color", "red");
            }
        });
    
     });
</script>

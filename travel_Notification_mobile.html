<!DOCTYPE html>
<html lang="en">

<head>
    <title>Banking Application Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!---Edits------>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/responsive_mobile.css">
    <script src="js/bootstrap.min.js"></script>
    <!-- <script src="js/CelebrusInsert.js"></script> -->
    <style>
        .col-12.row.m-0.p-0.w-100.justify-content-between.login-form-wrapper {
             display: flex;
             align-items: center;
        }
        .login .sidebar {
            min-width: 466px;
            display: inline-flex;
        }
        .bg-lightSkyBlue.left-banner-text-primary {
            background-color: #0580acc9 !important;
        }
        @media only screen and (max-width: 768px) {
            .login .sidebar {
                display: none;
            }
            .login .content-main {
                height: 100vh;
            }
        }
        @media only screen and (min-device-width: 0) and (max-device-width: 1920px) {
            .container-fluid.m-0.p-0.wrapper {
                max-width: inherit;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }
            .login-form-wrapper {
                background: none;
            }
            .container-fluid.wrapper > .col-12 {
                max-width: 480px;
                background-image: none;
                margin: 0 auto !important;
            }
            .mob-bg-blue-dark {
                background: #dff0f1;
            }
            /* .login .content-main {
                box-shadow: 0 1px 6px 0 #20212447;
            } */
            form.form-horizontal.w-sm-100 {
                height: initial;
                box-shadow: 0 1px 6px 0 #20212447;
                background: #e8fcfa;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            /* The device with borders */
            .smartphone {
            position: relative;
            width: 400px;
            height: 768px;
            margin: auto;
            border: 16px black solid;
            border-top-width: 60px;
            border-bottom-width: 60px;
            border-radius: 36px;
            }

            /* The horizontal line on the top of the device */
            .smartphone:before {
            content: '';
            display: block;
            width: 60px;
            height: 5px;
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #333;
            border-radius: 10px;
            }

            /* The circle on the bottom of the device */
            .smartphone:after {
            content: '';
            display: block;
            width: 35px;
            height: 35px;
            position: absolute;
            left: 50%;
            bottom: -65px;
            transform: translate(-50%, -50%);
            background: #333;
            border-radius: 50%;
            }

            /* The screen (or content) of the device */
            .smartphone .content {
            width: 100%;
            height: 100%;
            background: white;
            }
        }
    </style>
</head>

<body class="mob-bg-blue-dark">
    <div class="container-fluid m-0 p-0 wrapper login max-width-100">
        <div class="col-12 m-0 p-0">
            <div class="smartphone">
                <div class="content">
                    <iframe src="Travel_Notification_offer.html" style="width:100%;border:none;height:100%" />
                </div>
            </div>
        </div>
    </div>
</body>

</html>
